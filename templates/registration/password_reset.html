{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block layout %}
<div class="auth-shell">
    <div class="auth-card">
        <h1 class="auth-card__title">Reset password</h1>
        <p class="auth-card__subtitle">Enter your email and we'll send a reset link.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_div }}
            <button class="btn btn-dark w-100 mt-3" type="submit">Send reset link</button>
        </form>
    </div>
</div>
{% endblock %}
