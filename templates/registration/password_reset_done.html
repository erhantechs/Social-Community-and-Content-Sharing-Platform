{% extends "base.html" %}
{% block title %}Reset email sent{% endblock %}
{% block layout %}
<div class="auth-shell">
    <div class="auth-card">
        <h1 class="auth-card__title">Check your inbox</h1>
        <p class="auth-card__subtitle">If an account matches the email you entered, a reset link is on its way.</p>
        <a class="btn btn-dark w-100" href="{% url 'accounts:login' %}">Back to login</a>
    </div>
</div>
{% endblock %}
