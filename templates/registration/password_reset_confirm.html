{% extends "base.html" %}
{% block title %}Set new password{% endblock %}
{% block layout %}
<div class="auth-shell">
    <div class="auth-card">
        <h1 class="auth-card__title">New password</h1>
        {% if validlink %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_div }}
                <button class="btn btn-dark w-100 mt-3" type="submit">Save new password</button>
            </form>
        {% else %}
            <p class="text-muted">This reset link is invalid or expired.</p>
            <a class="btn btn-dark w-100" href="{% url 'accounts:password_reset' %}">Request a new one</a>
        {% endif %}
    </div>
</div>
{% endblock %}
