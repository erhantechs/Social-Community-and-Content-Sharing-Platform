[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    "venv",
    "migrations",
    "staticfiles",
    "media",
]

[tool.ruff.lint]
# A reasonable, opinionated default — pyflakes, pycodestyle, import order,
# flake8-bugbear, simplify, comprehensions. Add more later if you like.
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "UP",  # pyupgrade
    "DJ",  # flake8-django
]

ignore = [
    "E501",   # line-too-long (we set it to 100 already; ruff's auto-fix handles most)
    "B008",   # function call in default argument — common in Django (`default=timezone.now`)
    "DJ001",  # nullable CharField — we use null=True intentionally on optional URLs
]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["E", "W", "F", "I", "B", "UP"]
"*/tests.py"     = ["E501", "F841"]  # tests are allowed to be long-lined and have unused vars
"settings.py"    = ["F405", "E402"]

[tool.ruff.lint.isort]
known-first-party = ["accounts", "posts", "notifications", "messaging", "api", "socialhub"]
