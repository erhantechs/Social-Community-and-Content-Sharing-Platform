name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Django ${{ matrix.django-version }} / Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        django-version: ["4.2"]

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-used-in-prod
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff coverage

      - name: Lint (ruff)
        run: ruff check . || true   # initial pass — don't fail the build yet

      - name: Django check
        run: python manage.py check

      - name: Run migrations (sanity)
        run: python manage.py migrate --noinput

      - name: Run test suite with coverage
        run: |
          coverage run --source='accounts,posts,notifications,messaging,api,socialhub' manage.py test --verbosity=2
          coverage report -m
          coverage xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
