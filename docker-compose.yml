# Local development stack:  web + Postgres + Redis (channel layer + cache).
#
# Usage:
#   docker compose up --build
#   docker compose run --rm web python manage.py createsuperuser
#   docker compose run --rm web python manage.py seed
#
# Visit http://localhost:8000.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: socialhub
      POSTGRES_USER: socialhub
      POSTGRES_PASSWORD: socialhub_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialhub -d socialhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: dev-secret-not-for-production
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,web"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000"
      DATABASE_URL: postgres://socialhub:socialhub_dev_password@db:5432/socialhub
      REDIS_URL: redis://redis:6379/0
      DJANGO_DB_SSL: "false"
      DJANGO_LOG_LEVEL: INFO
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

volumes:
  postgres_data:
  media_data:
  static_data:
