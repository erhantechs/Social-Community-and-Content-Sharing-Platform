<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" role="img" aria-label="SocialHub">
  <title>SocialHub</title>
  <defs>
    <linearGradient id="logoPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#b3a4ff"/>
      <stop offset="100%" stop-color="#6e6df0"/>
    </linearGradient>
    <linearGradient id="logoPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#ffb3d1"/>
      <stop offset="100%" stop-color="#ff5e9c"/>
    </linearGradient>
    <radialGradient id="logoShine" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%"  stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Mark (icon) -->
  <g transform="translate(4 4)">
    <circle cx="32" cy="24" r="18" fill="url(#logoPink)"/>
    <circle cx="16" cy="24" r="18" fill="url(#logoPurple)"/>
    <circle cx="16" cy="24" r="18" fill="url(#logoShine)"/>
    <circle cx="24" cy="24" r="3.4" fill="#fff" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <text x="64" y="36"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="700"
        fill="currentColor"
        letter-spacing="-0.4">SocialHub</text>
</svg>
