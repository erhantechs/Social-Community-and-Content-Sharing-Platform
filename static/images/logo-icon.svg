    </linearGradient>
    <radialGradient id="iconShine" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%"  stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
