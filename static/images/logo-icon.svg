<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="SocialHub">
  <title>SocialHub</title>
  <defs>
    <linearGradient id="iconPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#b3a4ff"/>
      <stop offset="100%" stop-color="#6e6df0"/>
    </linearGradient>
    <linearGradient id="iconPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#ffb3d1"/>
